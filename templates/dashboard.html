<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>

    <p>Hello, <strong>{{ username }}</strong>! Your Role: {{ role }}</p>

        </div>
    
    <br><br>
    <a href="/logout">Logout</a>

</html>

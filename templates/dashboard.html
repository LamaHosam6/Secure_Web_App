<h1>Welcome {{ username }}</h1>
<p>Role: {{ role }}</p>

<form method="POST" action="/comment">
    <textarea name="comment" placeholder="Write comment"></textarea><br>
    <button>Post</button>
</form>

<h3>Comments</h3>

{% for c in comments %}
    <p>{{ c[0] }}</p>
{% endfor %}

<br>

<a href="/admin">Admin</a><br>
<a href="/logout">Logout</a>
